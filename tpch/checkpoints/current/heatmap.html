    `<span>PG shared_buffers: ${data.pg_shared_buffers}</span>`,
    data.commit_short
      ? `<span>Commit: <code>${data.commit_short}</code>${data.label ? ` &middot; <strong>${data.label}</strong>` : ''}</span>`
      : (data.commit ? `<span>Commit: <code>${data.commit.slice(0, 8)}</code>${data.label ? ` &middot; <strong>${data.label}</strong>` : ''}</span>` : ''),
  ].filter(Boolean).join('');

  // ── Summary cards ──────────────────────────────────────────────────────
  const pfPass = queries.filter(q => q.pgfusion_status === 'OK').length;
  const pgPass = queries.filter(q => q.postgres_status === 'OK').length;
  const pfTotal = queries.reduce((s, q) => s + (q.pgfusion_ms || 0), 0);
  const pgTotal = queries.reduce((s, q) => s + (q.postgres_ms || 0), 0);
  const bothPass = queries.filter(q => q.pgfusion_status === 'OK' && q.postgres_status === 'OK').length;

  // Improvement vs postgres: geomean speedup + win/loss count
  const compared = queries.filter(q =>
    q.pgfusion_status === 'OK' && q.postgres_status === 'OK' &&
    q.pgfusion_ms > 0 && q.postgres_ms > 0
  );
  const wins = compared.filter(q => q.pgfusion_ms <= q.postgres_ms).length;
  const losses = compared.length - wins;

  // Geometric mean of (postgres_ms / pgfusion_ms)
  let geomeanSpeedup = null;
  if (compared.length > 0) {
    const logSum = compared.reduce((s, q) => s + Math.log(q.postgres_ms / q.pgfusion_ms), 0);
    geomeanSpeedup = Math.exp(logSum / compared.length);
  }

  const speedupDisplay = geomeanSpeedup != null
    ? (geomeanSpeedup >= 1 ? `+${geomeanSpeedup.toFixed(2)}x` : `${geomeanSpeedup.toFixed(2)}x`)
    : '-';
  const speedupClass = geomeanSpeedup != null && geomeanSpeedup >= 1 ? 'win' : 'loss';

  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">pgfusion passed</div><div class="value pf">${pfPass} / ${queries.length}</div></div>
    <div class="summary-card"><div class="label">PostgreSQL passed</div><div class="value pg">${pgPass} / ${queries.length}</div></div>
    <div class="summary-card"><div class="label">pgfusion total</div><div class="value pf">${fmt(pfTotal)}</div></div>
    <div class="summary-card"><div class="label">PostgreSQL total</div><div class="value pg">${fmt(pgTotal)}</div></div>
    <div class="summary-card"><div class="label">Both passed</div><div class="value good">${bothPass}</div></div>
    <div class="summary-card">
      <div class="label">vs PostgreSQL</div>
      <div class="value ${speedupClass}">${speedupDisplay}</div>
      <div class="sub">geomean &middot; ${wins}W / ${losses}L</div>
    </div>
  `;

  // ── Bar chart ──────────────────────────────────────────────────────────
  {
    const labels = queries.map(q => q.name);
    const pfData = queries.map(q => q.pgfusion_status === 'OK' && q.pgfusion_ms > 0 ? q.pgfusion_ms : null);
    const pgData = queries.map(q => q.postgres_status === 'OK' && q.postgres_ms > 0 ? q.postgres_ms : null);

    new Chart(document.getElementById('bar-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'pgfusion',
            data: pfData,
            borderColor: 'rgba(88, 166, 255, 1)',
            backgroundColor: 'rgba(88, 166, 255, 0.15)',
            pointBackgroundColor: 'rgba(88, 166, 255, 1)',
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
            spanGaps: false,
          },
          {
            label: 'PostgreSQL',
            data: pgData,
            borderColor: 'rgba(247, 129, 102, 1)',
            backgroundColor: 'rgba(247, 129, 102, 0.15)',
            pointBackgroundColor: 'rgba(247, 129, 102, 1)',
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
            spanGaps: false,
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#8b949e', font: { family: "'SF Mono','Fira Code',monospace", size: 11 } },
          },
          tooltip: {
            backgroundColor: '#1c2128',
            borderColor: '#444c56',
            borderWidth: 1,
            titleColor: '#f0f6fc',
            bodyColor: '#c9d1d9',
            callbacks: {
              label: ctx => {
                const v = ctx.raw;
                if (v == null) return `${ctx.dataset.label}: ERROR`;
                return `${ctx.dataset.label}: ${v >= 1000 ? (v/1000).toFixed(2)+'s' : v.toFixed(1)+'ms'}`;
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#8b949e', font: { size: 11 } },
            grid: { color: '#21262d' },
          },
          y: {
            ticks: {
              color: '#8b949e',
              font: { size: 11 },
              callback: v => v >= 1000 ? (v/1000).toFixed(1)+'s' : v+'ms',
            },
            grid: { color: '#21262d' },
            title: { display: true, text: 'Time', color: '#8b949e', font: { size: 11 } },
          },
        },
      },
    });
  }

  // ── Color scale (per-query relative) ───────────────────────────────────
  const stops = [
    [0.0, 46, 160, 67],
    [0.5, 210, 183, 47],
    [1.0, 248, 81, 73],
  ];

  function ratioToColor(t) {
    let i = 0;
    while (i < stops.length - 2 && stops[i + 1][0] < t) i++;
    const [t0, r0, g0, b0] = stops[i];
    const [t1, r1, g1, b1] = stops[i + 1];
    const s = (t - t0) / (t1 - t0 || 1);
    return `rgb(${Math.round(r0 + (r1-r0)*s)},${Math.round(g0+(g1-g0)*s)},${Math.round(b0+(b1-b0)*s)})`;
  }

  function cellColor(myMs, otherMs) {
    if (myMs == null || myMs <= 0) return null;
    if (otherMs == null || otherMs <= 0) return ratioToColor(0);
    if (myMs <= otherMs) return ratioToColor(0);
    return ratioToColor(Math.min(1, Math.log2(myMs / otherMs)));
  }

  function fmt(ms) {
    if (ms == null) return '-';
    if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
    return ms.toFixed(1) + 'ms';
  }

  // Returns speedup label: "+Nx faster" (green) or "Nx slower" (red)
  function fmtSpeedup(pfMs, pgMs) {
    if (!pfMs || !pgMs || pfMs <= 0 || pgMs <= 0) return null;
    const ratio = pgMs / pfMs;
    if (ratio >= 1) return { text: `+${ratio.toFixed(2)}x faster`, cls: 'speedup-win' };
    return { text: `${(1 / ratio).toFixed(2)}x slower`, cls: 'speedup-loss' };
  }

  // ── Build table ───────────────────────────────────────────────────────
  const table = document.getElementById('heatmap');
  let sortCol = null;
  let sortAsc = true;

  function sortKey(q, col) {
    const pfMs = q.pgfusion_ms, pgMs = q.postgres_ms;
    const pfOk = q.pgfusion_status === 'OK' && pfMs != null;
    const pgOk = q.postgres_status === 'OK' && pgMs != null;
    if (col === 'query')    return parseInt(q.name.slice(1));
    if (col === 'pgfusion') return pfOk ? pfMs : Infinity;
    if (col === 'postgres') return pgOk ? pgMs : Infinity;
    if (col === 'speedup')  return (pfOk && pgOk && pfMs > 0) ? pgMs / pfMs : -Infinity;
    return 0;
  }

  function renderTable() {
    const sorted = [...queries];
    if (sortCol) {
      sorted.sort((a, b) => {
        const ka = sortKey(a, sortCol), kb = sortKey(b, sortCol);
        return sortAsc ? ka - kb : kb - ka;
      });
    }

    const arrow = col => sortCol !== col ? '' :
      `<span class="sort-arrow">${sortAsc ? '▲' : '▼'}</span>`;

    let html = `<thead><tr>
      <th class="query-col"   data-sort="query">Query${arrow('query')}</th>
      <th                     data-sort="pgfusion">pgfusion${arrow('pgfusion')}</th>
      <th                     data-sort="postgres">PostgreSQL${arrow('postgres')}</th>
      <th class="speedup-col" data-sort="speedup">vs PostgreSQL${arrow('speedup')}</th>
    </tr></thead><tbody>`;

    for (const q of sorted) {
      const pfMs = q.pgfusion_ms;
      const pgMs = q.postgres_ms;
      const pfOk = q.pgfusion_status === 'OK' && pfMs != null;
      const pgOk = q.postgres_status === 'OK' && pgMs != null;

      let speedupHtml = '<span class="speedup-na">-</span>';
      if (pfOk && pgOk) {
        const s = fmtSpeedup(pfMs, pgMs);
        if (s) speedupHtml = `<span class="${s.cls}">${s.text}</span>`;
      }

      html += `<tr>
        <td class="query-name" data-query="${q.name}">${q.name}</td>`;

      html += pfOk
        ? `<td><div class="cell" style="background:${cellColor(pfMs, pgMs)};color:rgba(255,255,255,0.95)" data-query="${q.name}" data-engine="pgfusion" data-ms="${pfMs}">${fmt(pfMs)}</div></td>`
        : `<td><div class="cell error" data-query="${q.name}" data-engine="pgfusion" data-ms="">ERROR</div></td>`;

      html += pgOk
        ? `<td><div class="cell" style="background:${cellColor(pgMs, pfMs)};color:rgba(255,255,255,0.95)" data-query="${q.name}" data-engine="PostgreSQL" data-ms="${pgMs}">${fmt(pgMs)}</div></td>`
        : `<td><div class="cell error" data-query="${q.name}" data-engine="PostgreSQL" data-ms="">ERROR</div></td>`;

      html += `<td class="speedup-cell">${speedupHtml}</td>
      </tr>`;
    }

    table.innerHTML = html + '</tbody>';
  }

  renderTable();

  // ── Sort on header click ──────────────────────────────────────────────
  table.addEventListener('click', e => {
    const th = e.target.closest('th[data-sort]');
    if (!th) return;
    const col = th.dataset.sort;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });

  // ── SQL lookup ─────────────────────────────────────────────────────────
  const sqlMap = {};
  for (const q of queries) { if (q.sql) sqlMap[q.name] = q.sql; }

  // ── Tooltip ───────────────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');

  table.addEventListener('mouseover', e => {
    const cell = e.target.closest('.cell');
    if (!cell) { tooltip.style.display = 'none'; return; }
    tooltip.querySelector('.tt-query').textContent = cell.dataset.query;
    tooltip.querySelector('.tt-engine').textContent = cell.dataset.engine;
    tooltip.querySelector('.tt-time').textContent = cell.dataset.ms
      ? `${parseFloat(cell.dataset.ms).toFixed(3)} ms` : 'ERROR';
    tooltip.style.display = 'block';
  });
  table.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY + 12) + 'px';
  });
  table.addEventListener('mouseout', e => {
    if (!e.target.closest('.cell')) tooltip.style.display = 'none';
  });

  // ── SQL popover ────────────────────────────────────────────────────────
  const popover    = document.getElementById('sql-popover');
  const popLabel   = popover.querySelector('.sql-label');
  const popPre     = popover.querySelector('pre');
  const popCopyBtn = popover.querySelector('.sql-copy-btn');
  let hideTimeout  = null;

  function showPopover(td) {
    const sql = sqlMap[td.dataset.query];
    if (!sql) return;
    popLabel.textContent = td.dataset.query;
    popPre.textContent = sql;
    popCopyBtn.textContent = 'Copy';
    popCopyBtn.classList.remove('copied');

    const rect = td.getBoundingClientRect();
    popover.style.display = 'block';
    const pr = popover.getBoundingClientRect();
    let left = rect.right + 8;
    let top  = rect.top;
    if (left + pr.width > window.innerWidth - 12)  left = rect.left - pr.width - 8;
    if (top  + pr.height > window.innerHeight - 12) top  = window.innerHeight - pr.height - 12;
    popover.style.left = left + 'px';
    popover.style.top  = Math.max(12, top) + 'px';
  }

  const scheduleHide = () => { hideTimeout = setTimeout(() => { popover.style.display = 'none'; }, 200); };
  const cancelHide   = () => { if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; } };

  table.addEventListener('mouseover', e => {
    const td = e.target.closest('td.query-name');
    if (td) { cancelHide(); showPopover(td); }
  });
  table.addEventListener('mouseout', e => {
    if (e.target.closest('td.query-name')) scheduleHide();
  });
  popover.addEventListener('mouseenter', cancelHide);
  popover.addEventListener('mouseleave', scheduleHide);

  popCopyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(popPre.textContent).then(() => {
      popCopyBtn.textContent = 'Copied!';
      popCopyBtn.classList.add('copied');
      setTimeout(() => { popCopyBtn.textContent = 'Copy'; popCopyBtn.classList.remove('copied'); }, 1500);
    });
  });

})();
</script>
</body>
</html>
