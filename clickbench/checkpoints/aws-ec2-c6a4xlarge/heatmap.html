<script>
(async function() {
  let data;
  // Prefer embedded data (injected by run.sh), fall back to fetch
  const embedded = document.getElementById('embedded-data').textContent.trim();
  if (embedded) {
    try { data = JSON.parse(embedded); } catch(e) { /* fall through to fetch */ }
  }
  if (!data) {
    try {
      const resp = await fetch('./results.json');
      data = await resp.json();
    } catch(e) {
      document.getElementById('meta').textContent = 'No results found. Run the benchmark first (./run.sh).';
      return;
    }
  }

  const queries = data.queries;

  // ── Meta ────────────────────────────────────────────────────────────────
  const meta = document.getElementById('meta');
  meta.innerHTML = [
    `<span>Run: ${data.timestamp}</span>`,
    `<span>Runs/query: ${data.runs_per_query}</span>`,
    `<span>PG version: ${data.pg_version}</span>`,
    `<span>PG parallel workers: ${data.pg_parallel_workers}</span>`,
    `<span>PG shared_buffers: ${data.pg_shared_buffers}</span>`,
  ].join('');

  // ── Summary cards ──────────────────────────────────────────────────────
  const pfPass = queries.filter(q => q.pgfusion_status === 'OK').length;
  const pgPass = queries.filter(q => q.postgres_status === 'OK').length;
  const pfTotal = queries.reduce((s, q) => s + (q.pgfusion_ms || 0), 0);
  const pgTotal = queries.reduce((s, q) => s + (q.postgres_ms || 0), 0);
  const bothPass = queries.filter(q => q.pgfusion_status === 'OK' && q.postgres_status === 'OK').length;

  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">pgfusion passed</div><div class="value pf">${pfPass} / ${queries.length}</div></div>
    <div class="summary-card"><div class="label">PostgreSQL passed</div><div class="value pg">${pgPass} / ${queries.length}</div></div>
    <div class="summary-card"><div class="label">pgfusion total</div><div class="value pf">${fmt(pfTotal)}</div></div>
    <div class="summary-card"><div class="label">PostgreSQL total</div><div class="value pg">${fmt(pgTotal)}</div></div>
    <div class="summary-card"><div class="label">Both passed</div><div class="value good">${bothPass}</div></div>
  `;

  // ── Color scale (per-query relative) ───────────────────────────────────
  // Green = faster engine, red = slower engine within each row.
  // t=0 (fastest) -> green, t=1 (slowest) -> red. Equal -> yellow.

  // 3-stop ramp: green -> yellow -> red
  const stops = [
    [0.0, 46, 160, 67],    // #2ea043 green
    [0.5, 210, 183, 47],   // #d2b72f yellow
    [1.0, 248, 81, 73],    // #f85149 red
  ];

  function ratioToColor(t) {
    let i = 0;
    while (i < stops.length - 2 && stops[i + 1][0] < t) i++;
    const [t0, r0, g0, b0] = stops[i];
    const [t1, r1, g1, b1] = stops[i + 1];
    const s = (t - t0) / (t1 - t0 || 1);
    const r = Math.round(r0 + (r1 - r0) * s);
    const g = Math.round(g0 + (g1 - g0) * s);
    const b = Math.round(b0 + (b1 - b0) * s);
    return `rgb(${r}, ${g}, ${b})`;
  }

  // Returns 0..1 where 0 = faster (green), 1 = slower (red)
  // The faster side always gets pure green (0), the slower side gets a
  // redness proportional to how much slower it is.
  function cellColor(myMs, otherMs) {
    if (myMs == null || myMs <= 0) return null;
    if (otherMs == null || otherMs <= 0) return ratioToColor(0); // other errored, I'm the winner
    if (myMs <= otherMs) return ratioToColor(0); // I'm faster or equal -> green
    const ratio = myMs / otherMs; // >1, how much slower am I
    // Map ratio 1..inf to 0..1: ratio=1 -> 0, ratio=2 -> 0.5, ratio=4+ -> ~1
    const t = Math.min(1, Math.log2(ratio));
    return ratioToColor(t);
  }

  function textColor() {
    return 'rgba(255,255,255,0.95)';
  }

  function fmt(ms) {
    if (ms == null) return '-';
    if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
    return ms.toFixed(1) + 'ms';
  }

  // ── Build table ───────────────────────────────────────────────────────
  const table = document.getElementById('heatmap');
  let sortCol = null; // 'query' | 'pgfusion' | 'postgres' | 'ratio'
  let sortAsc = true;

  function sortKey(q, col) {
    const pfMs = q.pgfusion_ms, pgMs = q.postgres_ms;
    const pfOk = q.pgfusion_status === 'OK' && pfMs != null;
    const pgOk = q.postgres_status === 'OK' && pgMs != null;
    if (col === 'query') return parseInt(q.name.slice(1)); // numeric part of Q0, Q1...
    if (col === 'pgfusion') return pfOk ? pfMs : Infinity;
    if (col === 'postgres') return pgOk ? pgMs : Infinity;
    if (col === 'ratio') return (pfOk && pgOk && pfMs > 0) ? pgMs / pfMs : -Infinity;
    return 0;
  }

  function renderTable() {
    const sorted = [...queries];
    if (sortCol) {
      sorted.sort((a, b) => {
        const ka = sortKey(a, sortCol), kb = sortKey(b, sortCol);
        return sortAsc ? ka - kb : kb - ka;
      });
    }

    const arrow = (col) => {
      if (sortCol !== col) return '';
      return `<span class="sort-arrow">${sortAsc ? '\u25B2' : '\u25BC'}</span>`;
    };

    let html = `<thead><tr>
      <th class="query-col" data-sort="query">Query${arrow('query')}</th>
      <th data-sort="pgfusion">pgfusion${arrow('pgfusion')}</th>
      <th data-sort="postgres">PostgreSQL${arrow('postgres')}</th>
      <th class="ratio-col" data-sort="ratio">PG / pgf${arrow('ratio')}</th>
    </tr></thead><tbody>`;

    for (const q of sorted) {
      const pfMs = q.pgfusion_ms;
      const pgMs = q.postgres_ms;
      const pfOk = q.pgfusion_status === 'OK' && pfMs != null;
      const pgOk = q.postgres_status === 'OK' && pgMs != null;

      let ratioHtml = '<span class="ratio-na">-</span>';
      if (pfOk && pgOk && pfMs > 0) {
        const ratio = pgMs / pfMs;
        const cls = ratio > 1 ? 'ratio-slower' : 'ratio-faster';
        ratioHtml = `<span class="${cls}">${ratio.toFixed(2)}x</span>`;
      }

      html += `<tr>`;
      html += `<td class="query-name" data-query="${q.name}">${q.name}</td>`;

      if (pfOk) {
        html += `<td><div class="cell" style="background:${cellColor(pfMs, pgMs)};color:${textColor()}" data-query="${q.name}" data-engine="pgfusion" data-ms="${pfMs}">${fmt(pfMs)}</div></td>`;
      } else {
        html += `<td><div class="cell error" data-query="${q.name}" data-engine="pgfusion" data-ms="">ERROR</div></td>`;
      }

      if (pgOk) {
        html += `<td><div class="cell" style="background:${cellColor(pgMs, pfMs)};color:${textColor()}" data-query="${q.name}" data-engine="PostgreSQL" data-ms="${pgMs}">${fmt(pgMs)}</div></td>`;
      } else {
        html += `<td><div class="cell error" data-query="${q.name}" data-engine="PostgreSQL" data-ms="">ERROR</div></td>`;
      }

      html += `<td class="ratio-cell">${ratioHtml}</td>`;
      html += `</tr>`;
    }

    html += `</tbody>`;
    table.innerHTML = html;
  }

  renderTable();

  // ── Sort on header click ──────────────────────────────────────────────
  table.addEventListener('click', e => {
    const th = e.target.closest('th[data-sort]');
    if (!th) return;
    const col = th.dataset.sort;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });

  // ── SQL lookup ─────────────────────────────────────────────────────────
  const sqlMap = {};
  for (const q of queries) {
    if (q.sql) sqlMap[q.name] = q.sql;
  }

  // ── Tooltip (time cells) ──────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');

  table.addEventListener('mouseover', e => {
    const cell = e.target.closest('.cell');
    if (!cell) { tooltip.style.display = 'none'; return; }
    const query = cell.dataset.query;
    const engine = cell.dataset.engine;
    const ms = cell.dataset.ms;

    tooltip.querySelector('.tt-query').textContent = query;
    tooltip.querySelector('.tt-engine').textContent = engine;
    tooltip.querySelector('.tt-time').textContent = ms ? `${parseFloat(ms).toFixed(3)} ms` : 'ERROR';
    tooltip.style.display = 'block';
  });

  table.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
  });

  table.addEventListener('mouseout', e => {
    if (!e.target.closest('.cell')) tooltip.style.display = 'none';
  });

  // ── SQL popover (query name cells) ────────────────────────────────────
  const popover = document.getElementById('sql-popover');
  const popLabel = popover.querySelector('.sql-label');
  const popPre = popover.querySelector('pre');
  const popCopyBtn = popover.querySelector('.sql-copy-btn');
  let popoverQuery = null;
  let hideTimeout = null;

  function showPopover(td) {
    const qname = td.dataset.query;
    const sql = sqlMap[qname];
    if (!sql) return;

    popoverQuery = qname;
    popLabel.textContent = qname;
    popPre.textContent = sql;
    popCopyBtn.textContent = 'Copy';
    popCopyBtn.classList.remove('copied');

    // Position to the right of the query name cell
    const rect = td.getBoundingClientRect();
    popover.style.display = 'block';
    const popRect = popover.getBoundingClientRect();
    let left = rect.right + 8;
    let top = rect.top;
    // Keep within viewport
    if (left + popRect.width > window.innerWidth - 12) {
      left = rect.left - popRect.width - 8;
    }
    if (top + popRect.height > window.innerHeight - 12) {
      top = window.innerHeight - popRect.height - 12;
    }
    popover.style.left = left + 'px';
    popover.style.top = Math.max(12, top) + 'px';
  }

  function scheduleHide() {
    hideTimeout = setTimeout(() => {
      popover.style.display = 'none';
      popoverQuery = null;
    }, 200);
  }

  function cancelHide() {
    if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }
  }

  table.addEventListener('mouseover', e => {
    const td = e.target.closest('td.query-name');
    if (td) {
      cancelHide();
      showPopover(td);
    }
  });

  table.addEventListener('mouseout', e => {
    const td = e.target.closest('td.query-name');
    if (td) scheduleHide();
  });

  popover.addEventListener('mouseenter', cancelHide);
  popover.addEventListener('mouseleave', scheduleHide);

  popCopyBtn.addEventListener('click', () => {
    const sql = popPre.textContent;
    navigator.clipboard.writeText(sql).then(() => {
      popCopyBtn.textContent = 'Copied!';
      popCopyBtn.classList.add('copied');
      setTimeout(() => {
        popCopyBtn.textContent = 'Copy';
        popCopyBtn.classList.remove('copied');
      }, 1500);
    });
  });

})();
</script>
</body>
</html>
